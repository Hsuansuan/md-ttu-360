<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360網站</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        /* 2. 設定你的 360 觀景窗大小 */
        #panorama {
            width: 100%;
            height: 500px; /* 可以依你的喜好調整高度 */
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">歡迎來到我的 360 度環景導覽</h1>

    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "專題803_照片.JPG", // ⚠️ 這裡換成你的照片路徑
            "autoLoad": true,                  // 是否自動載入照片
            "autoRotate": -2                   // 是否自動旋轉 (負數順時針，0就不動)
        });
    </script>

</body>
</html>
