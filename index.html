<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>大同大學數媒系教室360°導覽</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

        <style>
            /*360照片的大小*/
            #panorama {
                width: 100%;
                height: 500px;
                background: #f0f0f0;
            }
        </style>
    </head>
    <body>
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">大同大學數媒系教室360°導覽</h1>
                    <p class="lead fw-normal text-white-50 mb-0">點擊下方教室，即可進入360°環景視角</p>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row gx-4 gx-lg-5 row-cols-1 row-cols-md-2 row-cols-xl-3 justify-content-center">
                    
                    <div class="col mb-5">
                        <div class="card h-100">
                            <img class="card-img-top" src="專題803.jpg" alt="專題803教室" style="height: 200px; object-fit: cover;" />
                            <div class="card-body p-4">
                                <div class="text-center">
                                    <h5 class="fw-bolder">尚志803專題教室</h5>
                                    <p class="text-muted small">這是一間專門提供給大三、大四進行專題討論與實作空間。</p>
                                </div>
                            </div>
                            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                                <div class="text-center">
                                    <button class="btn btn-outline-dark mt-auto" onclick="open360('專題803.jpg', '專題 803 教室')">
                                        進入 360° 環景
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col mb-5">
                        <div class="card h-100">
                            <img class="card-img-top" src="https://dummyimage.com/450x300/dee2e6/6c757d.jpg" alt="..." style="height: 200px; object-fit: cover;" />
                            <div class="card-body p-4">
                                <div class="text-center">
                                    <h5 class="fw-bolder">尚志教育研究館</h5>
                                    <p class="text-muted small">請在上傳新照片後，將下方的檔名替換掉即可觀看。</p>
                                </div>
                            </div>
                            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                                <div class="text-center">
                                    <button class="btn btn-outline-dark mt-auto" onclick="open360('這裡放下一張照片的檔名.jpg', '尚志教育研究館')">
                                        進入 360° 環景
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <div class="modal fade" id="panoramaModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">教室環景導覽</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <div id="panorama"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; 大同大學自主學習專題 2026</p></div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            let viewerInstance = null;

            function open360(imageName, roomName) {
                // 1. 設定彈出視窗的標題
                document.getElementById('modalTitle').innerText = roomName + " - 360° 環景導覽";
                
                // 2. 顯示彈出視窗
                var myModal = new bootstrap.Modal(document.getElementById('panoramaModal'));
                myModal.show();

                // 3. 等視窗動畫跑完後，再載入 360 照片 (避免畫面錯位)
                document.getElementById('panoramaModal').addEventListener('shown.bs.modal', function () {
                    // 如果之前有建立過，先清除舊的
                    if(viewerInstance) { viewerInstance.destroy(); }
                    
                    // 初始化新的 360 照片
                    viewerInstance = pannellum.viewer('panorama', {
                        "type": "equirectangular",
                        "panorama": imageName,
                        "autoLoad": true,
                        "autoRotate": -1
                    });
                }, { once: true }); // once: true 代表這個監聽器執行一次就失效，避免重複疊加
            }
        </script>
    </body>
</html>
