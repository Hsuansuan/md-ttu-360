        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            let viewerInstance = null;
            
            // 💡 用來暫存目前點開教室的兩張照片檔名
            let currentLeftImage = "";
            let currentRightImage = "";

            // 💡 渲染環景畫面的獨立函式
            function renderPannellum(imgName) {
                if(viewerInstance) { viewerInstance.destroy(); }
                
                viewerInstance = pannellum.viewer('panorama', {
                    "type": "equirectangular",
                    "panorama": imgName,
                    "autoLoad": true,
                    "autoRotate": -1
                });
            }

            // 💡 修改後的 open360 函式，多接收一個右邊的照片參數
            function open360(leftImage, rightImage, roomName) {
                
                // 將檔名存到全域變數，讓點擊左右箭頭時知道要換成誰
                currentLeftImage = leftImage;
                currentRightImage = rightImage;

                document.getElementById('modalTitle').innerText = roomName + " - 360°環景導覽";
                
                // 💡 檢查是否有兩張照片，如果只有一張，就把左右箭頭隱藏起來
                if (leftImage && rightImage) {
                    document.getElementById('btnLeft').style.display = 'flex';
                    document.getElementById('btnRight').style.display = 'flex';
                } else {
                    document.getElementById('btnLeft').style.display = 'none';
                    document.getElementById('btnRight').style.display = 'none';
                }

                var myModal = new bootstrap.Modal(document.getElementById('panoramaModal'));
                myModal.show();

                document.getElementById('panoramaModal').addEventListener('shown.bs.modal', function () {
                    // 預設一進來先載入左邊（第一張）視角的照片
                    renderPannellum(currentLeftImage);
                }, { once: true });
            }

            // 💡 點擊左右箭頭時觸發的切換邏輯
            function switchView(direction) {
                if (direction === 'left' && currentLeftImage) {
                    renderPannellum(currentLeftImage);
                } else if (direction === 'right' && currentRightImage) {
                    renderPannellum(currentRightImage);
                }
            }
        </script>
